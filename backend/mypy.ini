[mypy]
python_version = 3.11
# Type-check the slim bootstrap + the pure services layer. routes/ and most
# third-party seams (sentry-sdk, push, boto3, motor, pyotp) are not annotated
# upstream, so we keep them out of the strict block by using follow_imports=silent.
files = server.py, services
warn_unused_configs = True
warn_return_any = False
warn_unused_ignores = False
ignore_missing_imports = True
# Permissive defaults — the goal of this pass is to surface *real* type errors,
# not force-annotate every helper. `disallow_untyped_defs` is intentionally OFF;
# enable it in a follow-up iteration when the team is ready.
disallow_untyped_defs = False
check_untyped_defs = True
no_implicit_optional = True
strict_optional = True
show_error_codes = True
pretty = True
# Imports are followed for cross-file type info but errors from those files are
# silenced. This is the standard "incremental adoption" pattern.
follow_imports = silent

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-pyotp.*]
ignore_missing_imports = True

[mypy-pywebpush.*]
ignore_missing_imports = True

[mypy-sentry_sdk.*]
ignore_missing_imports = True

[mypy-motor.*]
ignore_missing_imports = True

[mypy-pymongo.*]
ignore_missing_imports = True

[mypy-reportlab.*]
ignore_missing_imports = True
