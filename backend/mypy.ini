[mypy]
python_version = 3.11
# iter43: strict-mode coverage expanded from `server.py + services/*` to also
# include `routes/*` — every public-facing handler must declare a return type.
files = server.py, services, routes
warn_unused_configs = True
warn_return_any = False
warn_unused_ignores = False
ignore_missing_imports = True
# Strict mode for the scoped surface (server.py + services/* + routes/*). Any
# new function added to these files MUST be annotated — both arguments and
# return type.
disallow_untyped_defs = True
check_untyped_defs = True
no_implicit_optional = True
strict_optional = True
show_error_codes = True
pretty = True
# Imports are followed for cross-file type info but errors from those files are
# silenced. This is the standard "incremental adoption" pattern.
follow_imports = silent

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-pyotp.*]
ignore_missing_imports = True

[mypy-pywebpush.*]
ignore_missing_imports = True

[mypy-sentry_sdk.*]
ignore_missing_imports = True

[mypy-motor.*]
ignore_missing_imports = True

[mypy-pymongo.*]
ignore_missing_imports = True

[mypy-reportlab.*]
ignore_missing_imports = True
