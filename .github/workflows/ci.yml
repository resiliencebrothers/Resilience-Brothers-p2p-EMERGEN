name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Nightly full-suite run (03:00 UTC) — catches slow-drift regressions that
  # the critical subset can miss. Runs the same env as the PR job but
  # invokes `make test-all` instead of `make test-critical`.
  schedule:
    - cron: "0 3 * * *"

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Backend — static type-checking with mypy
  # ===========================================================================
  backend-mypy:
    name: Backend · mypy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run mypy
        run: python -m mypy --config-file mypy.ini

  # ===========================================================================
  # Backend — pytest regression suite
  # ===========================================================================
  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest
    # PR/push: ~2 min budget (test-critical is 1 min + setup).
    # Nightly cron: ~15 min budget (test-all is 8-9 min + setup + margin).
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: resilience_ci
      # Tests read BASE_URL from this env var (see backend/tests/conftest.py).
      REACT_APP_BACKEND_URL: http://localhost:8001
      # Test-only secrets — never reuse outside CI.
      EMERGENT_LLM_KEY: ci-placeholder
      TOTP_MASTER_KEY: DCsJczEUBaU7PrVwn3qe7HIM0yaOaQwxc2a2STel5Ps=
      JWT_SECRET: ci_jwt_secret_change_me
      APP_PUBLIC_URL: http://localhost:8001
      # Auth / CORS — allow localhost so the security middleware doesn't reject
      # the ingress traffic the tests generate.
      CORS_ORIGINS: http://localhost:8001,http://localhost:3000
      RATE_LIMIT_ENABLED: "false"
      APP_AUTO_BLOCK_ENABLED: "false"
      # Google OAuth — placeholders. `/api/auth/google/*` tests skip when the
      # id/secret are missing; the flow-free tests still pass.
      GOOGLE_CLIENT_ID: ci-placeholder.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: ci-placeholder
      # Email / storage / push — placeholders trigger graceful noop paths.
      RESEND_API_KEY: re_ci_placeholder
      STORAGE_PROVIDER: none
      VAPID_PUBLIC_KEY: BJD0_ci_placeholder
      VAPID_PRIVATE_KEY: ci_placeholder
      VAPID_SUBJECT: mailto:ci@example.com
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/localhost/27017) 2>/dev/null; then
              echo "Mongo is up"; exit 0
            fi
            sleep 2
          done
          echo "Mongo never came up"; exit 1

      - name: Seed test users
        run: python scripts/seed_test_users.py

      - name: Start FastAPI (background)
        run: |
          nohup uvicorn server:app --host 0.0.0.0 --port 8001 > /tmp/uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:8001/api/ > /dev/null; then exit 0; fi
            sleep 1
          done
          echo "FastAPI never came up"; tail -n 50 /tmp/uvicorn.log; exit 1

      - name: Run pytest (critical on PR / push, full on nightly cron)
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Nightly cron → make test-all (935 tests, ~8-9 min)"
            make -C .. test-all
          else
            echo "PR/push → make test-critical (91 tests, ~1 min)"
            make -C .. test-critical
          fi

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-log
          path: /tmp/uvicorn.log
          retention-days: 7

  # ===========================================================================
  # Frontend — ESLint
  # ===========================================================================
  frontend-lint:
    name: Frontend · ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install JS deps (frozen lockfile)
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint || npx eslint "src/**/*.{js,jsx}"
