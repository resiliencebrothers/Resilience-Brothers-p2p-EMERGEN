name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Backend — static type-checking with mypy
  # ===========================================================================
  backend-mypy:
    name: Backend · mypy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run mypy
        run: python -m mypy --config-file mypy.ini

  # ===========================================================================
  # Backend — pytest regression suite
  # ===========================================================================
  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: resilience_ci
      # Test-only secrets — never reuse outside CI.
      EMERGENT_LLM_KEY: ci-placeholder
      TOTP_MASTER_KEY: ci_totp_master_key_change_me
      JWT_SECRET: ci_jwt_secret_change_me
      APP_PUBLIC_URL: http://localhost:8001
      RESEND_API_KEY: re_ci_placeholder
      STORAGE_PROVIDER: disabled
      VAPID_PUBLIC_KEY: BJD0_ci_placeholder
      VAPID_PRIVATE_KEY: ci_placeholder
      VAPID_SUBJECT: mailto:ci@example.com
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/localhost/27017) 2>/dev/null; then
              echo "Mongo is up"; exit 0
            fi
            sleep 2
          done
          echo "Mongo never came up"; exit 1

      - name: Start FastAPI (background)
        run: |
          nohup uvicorn server:app --host 0.0.0.0 --port 8001 > /tmp/uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:8001/api/ > /dev/null; then exit 0; fi
            sleep 1
          done
          echo "FastAPI never came up"; tail -n 50 /tmp/uvicorn.log; exit 1

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short -p no:cacheprovider

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-log
          path: /tmp/uvicorn.log
          retention-days: 7

  # ===========================================================================
  # Frontend — ESLint
  # ===========================================================================
  frontend-lint:
    name: Frontend · ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install JS deps (frozen lockfile)
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint || npx eslint "src/**/*.{js,jsx}"
